name: Validate Skill

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate settings.json (JSON syntax)
        run: python3 -m json.tool .claude/settings.json > /dev/null && echo "✓ settings.json valid"

      - name: Validate reference-router.py (Python syntax)
        run: python3 -m py_compile .claude/hooks/reference-router.py && echo "✓ reference-router.py valid"

      - name: Validate SKILL.md description length (≤ 1024 chars)
        run: |
          python3 - <<'EOF'
          import re, sys
          content = open("master-instructional-design/SKILL.md").read()
          m = re.search(r'description: >\n(.*?)^---', content, re.MULTILINE | re.DOTALL)
          if not m:
              print("ERROR: Could not parse description field from SKILL.md frontmatter")
              sys.exit(1)
          desc = ' '.join(line.strip() for line in m.group(1).strip().splitlines())
          count = len(desc)
          print(f"Description length: {count}/1024 chars")
          if count > 1024:
              print(f"ERROR: Description exceeds 1024-char limit by {count - 1024} chars")
              sys.exit(1)
          print("✓ Description within limit")
          EOF

      - name: Check all reference files have license footer
        run: |
          python3 - <<'EOF'
          import os, sys
          refs_dir = "master-instructional-design/references"
          missing = []
          for fname in sorted(os.listdir(refs_dir)):
              if not fname.endswith(".md"):
                  continue
              content = open(os.path.join(refs_dir, fname)).read()
              if "CC BY-NC-ND" not in content:
                  missing.append(fname)
          if missing:
              print(f"ERROR: Missing license footer in: {', '.join(missing)}")
              sys.exit(1)
          count = len([f for f in os.listdir(refs_dir) if f.endswith(".md")])
          print(f"✓ License footer present in all {count} reference files")
          EOF

      - name: Check SKILL.md frontmatter has required fields
        run: |
          python3 - <<'EOF'
          import sys
          content = open("master-instructional-design/SKILL.md").read()
          required = ["name:", "version:", "license:", "description:"]
          missing = [f for f in required if f not in content[:600]]
          if missing:
              print(f"ERROR: SKILL.md frontmatter missing fields: {missing}")
              sys.exit(1)
          print("✓ SKILL.md frontmatter has all required fields")
          EOF

      - name: Verify reference file count matches README
        run: |
          python3 - <<'EOF'
          import os, re, sys
          actual = len([f for f in os.listdir("master-instructional-design/references") if f.endswith(".md")])
          readme = open("README.md").read()
          m = re.search(r'\*\*(\d+) reference files\*\*', readme)
          if not m:
              print("WARNING: Could not find reference file count in README.md")
              sys.exit(0)
          stated = int(m.group(1))
          if actual != stated:
              print(f"ERROR: README says {stated} reference files but {actual} exist")
              sys.exit(1)
          print(f"✓ README count matches actual: {actual} reference files")
          EOF

      - name: Install zip utility
        run: sudo apt-get install -y zip

      - name: Check .skill bundle is current
        run: bash build.sh --check

      - name: Pipe-test reference router (smoke test)
        run: |
          result=$(echo '{"message": "How do I disable the Next button in Storyline until all hotspots are clicked?"}' | python3 .claude/hooks/reference-router.py)
          echo "Router output: $result"
          echo "$result" | python3 -m json.tool > /dev/null && echo "✓ Router output is valid JSON"
          echo "$result" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          ref = d['hookSpecificOutput']['additionalContext']
          assert 'authoring-tools.md' in ref, f'Expected authoring-tools.md, got: {ref}'
          print(f'✓ Router routes correctly: {ref}')
          "
